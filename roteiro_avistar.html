body{font-family:system-ui,sans-serif;color:#1a1a1a;background:#f5f5f2;padding:1.5rem}
h1{font-size:20px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a}
.search-bar{display:flex;gap:8px;margin-bottom:1rem}

.search-bar input:focus{outline:none;border-color:#7F77DD}
.search-bar button{padding:9px 18px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;white-space:nowrap}
.search-bar button:hover{background:#f0f0f0}
.tags-area{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;min-height:32px}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:#EEEDFE;border:1px solid #AFA9EC;color:#3C3489}
.tag .x{cursor:pointer;opacity:0.6;font-size:10px}
.tag .x:hover{opacity:1}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filters select{padding:7px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.results-header span{font-size:13px;color:#666}
.results-header button{padding:6px 14px;font-size:12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer}
.results-header button:hover{background:#f0f0f0}
.card{border:1px solid #e0e0e0;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;background:#fff;transition:border-color .15s}
.card:hover{border-color:#aaa}
.card.selected{border-color:#7F77DD;background:#EEEDFE}
.card.selected .card-titulo{color:#3C3489}
.card-check{width:18px;height:18px;border-radius:4px;border:1px solid #ccc;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff}
.card.selected .card-check{background:#7F77DD;border-color:#7F77DD;color:white}
.card-body{flex:1;min-width:0}
.card-titulo{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.4}
.card-meta{font-size:12px;color:#666;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.badge-aud{background:#E1F5EE;color:#085041}
.badge-dia{background:#FAEEDA;color:#633806}
.badge-hora{background:#E6F1FB;color:#0C447C}
.conflict{background:#FCEBEB;border-radius:4px;padding:2px 6px;font-size:11px;color:#791F1F;margin-left:6px}
.divider{border:none;border-top:1px solid #e0e0e0;margin:1.5rem 0}
.roteiro-section{margin-top:1rem}
.roteiro-title{font-size:15px;font-weight:500;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between}
.roteiro-title .count{font-size:12px;font-weight:400;color:#666}
.roteiro-day{margin-bottom:1rem}
.roteiro-day-label{font-size:12px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e0e0e0}
.roteiro-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.roteiro-item:last-child{border-bottom:none}
.roteiro-time{font-size:12px;color:#666;min-width:42px;font-weight:500;padding-top:1px}
.roteiro-info{flex:1}
.roteiro-info .t{font-size:13px;font-weight:500;line-height:1.35}
.roteiro-info .s{font-size:12px;color:#666;margin-top:2px}
.btn-export{margin-top:1rem;padding:10px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;width:100%}
.btn-export:hover{background:#f0f0f0}
.empty{text-align:center;color:#aaa;font-size:13px;padding:2rem 0}
mark{background:#FAC775;border-radius:2px;padding:0 1px}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.panel{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>
</head>

let keywords=[];
let selected=new Set();

const auditorios=[...new Set(DATA.map(d=>d.auditorio))].sort();
const audSel=document.getElementById('filter-aud');
auditorios.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;audSel.appendChild(o);});

document.getElementById('kw-input').addEventListener('keydown',e=>{if(e.key==='Enter')addKeyword();});

function addKeyword(){
  const v=document.getElementById('kw-input').value.trim().toLowerCase();
  if(!v||keywords.includes(v))return;
  keywords.push(v);
  document.getElementById('kw-input').value='';
  renderTags();render();
}
function removeKeyword(kw){keywords=keywords.filter(k=>k!==kw);renderTags();render();}
function renderTags(){
  const area=document.getElementById('tags-area');
  area.innerHTML='';
  keywords.forEach(k=>{
    const t=document.createElement('span');
    t.className='tag';
    t.innerHTML=k+' <span class="x" onclick="removeKeyword(\''+k+'\')">✕</span>';
    area.appendChild(t);
  });
}
function normalize(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function matches(item){
  if(!keywords.length)return false;
  const text=normalize(item.titulo+' '+item.nome+' '+item.auditorio);
  return keywords.some(k=>text.includes(normalize(k)));
}
function highlight(text){
  let out=text;
  keywords.forEach(k=>{
    const nk=normalize(k);
    const re=new RegExp('('+nk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    out=out.replace(re,'<mark>$1</mark>');
  });
  return out;
}
function getId(item){return item.dia+'|'+item.hora+'|'+item.auditorio+'|'+item.nome;}
function hasConflict(item){
  return[...selected].some(id=>{
    const p=id.split('|');
    return p[0]===item.dia&&p[1]===item.hora&&p[3]!==item.nome;
  });
}
function render(){
  const dia=document.getElementById('filter-dia').value;
  const aud=document.getElementById('filter-aud').value;
  let results=DATA.filter(d=>{
    if(!matches(d))return false;
    if(dia&&d.dia!==dia)return false;
    if(aud&&d.auditorio!==aud)return false;
    return true;
  });
  results.sort((a,b)=>a.dia.localeCompare(b.dia)||a.hora.localeCompare(b.hora));
  document.getElementById('results-count').textContent=results.length+' palestra(s) encontrada(s)';
  const list=document.getElementById('results-list');
  if(!keywords.length){list.innerHTML='<div class="empty">Digite uma palavra-chave para buscar sessões</div>';return;}
  if(!results.length){list.innerHTML='<div class="empty">Nenhuma sessão encontrada</div>';return;}
  list.innerHTML=results.map(item=>{
    const id=getId(item);
    const sel=selected.has(id);
    const conf=!sel&&hasConflict(item);
    return`<div class="card${sel?' selected':''}" onclick="toggle('${id.replace(/'/g,"\\'").replace(/\n/g,' ')}')">
      <div class="card-check">${sel?'✓':''}</div>
      <div class="card-body">
        <div class="card-titulo">${highlight(item.titulo)||'—'}${conf?'<span class="conflict">Conflito de horário</span>':''}</div>
        <div class="card-meta">
          <span>${highlight(item.nome)||'—'}</span>
          <span class="badge badge-dia">Dia ${item.dia}</span>
          <span class="badge badge-hora">${item.hora}</span>
          <span class="badge badge-aud">${item.auditorio}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}
function toggle(id){
  if(selected.has(id))selected.delete(id);else selected.add(id);
  render();renderRoteiro();
}
function addAll(){
  const dia=document.getElementById('filter-dia').value;
  const aud=document.getElementById('filter-aud').value;
  DATA.filter(d=>{
    if(!matches(d))return false;
    if(dia&&d.dia!==dia)return false;
    if(aud&&d.auditorio!==aud)return false;
    return true;
  }).forEach(d=>selected.add(getId(d)));
  render();renderRoteiro();
}
function renderRoteiro(){
  const items=[...selected].map(id=>{
    const parts=id.split('|');
    const dia=parts[0],hora=parts[1],auditorio=parts[2],nome=parts.slice(3).join('|');
    return DATA.find(d=>d.dia===dia&&d.hora===hora&&d.auditorio===auditorio&&d.nome===nome);
  }).filter(Boolean);
  items.sort((a,b)=>a.dia.localeCompare(b.dia)||a.hora.localeCompare(b.hora));
  document.getElementById('roteiro-count').textContent=items.length+' sessão(ões)';
  const byDay={'15':[],'16':[],'17':[]};
  items.forEach(i=>{if(byDay[i.dia])byDay[i.dia].push(i);});
  const dayLabels={'15':'Dia 15','16':'Dia 16','17':'Dia 17'};
  let html='';
  if(!items.length){html='<div class="empty">Nenhuma sessão adicionada ainda</div>';}
  else{
    ['15','16','17'].forEach(d=>{
      if(!byDay[d].length)return;
      let conflicts={};
      byDay[d].forEach(i=>{if(!conflicts[i.hora])conflicts[i.hora]=[];conflicts[i.hora].push(i);});
      html+=`<div class="roteiro-day"><div class="roteiro-day-label">${dayLabels[d]}</div>`;
      byDay[d].forEach(i=>{
        const hasC=conflicts[i.hora].length>1;
        html+=`<div class="roteiro-item">
          <div class="roteiro-time">${i.hora}</div>
          <div class="roteiro-info">
            <div class="t">${i.titulo||'—'}${hasC?'<span class="conflict">Conflito</span>':''}</div>
            <div class="s">${i.nome||'—'} · ${i.auditorio}</div>
          </div>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('roteiro-list').innerHTML=html;
}
function exportRoteiro(){
  const items=[...selected].map(id=>{
    const parts=id.split('|');
    const dia=parts[0],hora=parts[1],auditorio=parts[2],nome=parts.slice(3).join('|');
    return DATA.find(d=>d.dia===dia&&d.hora===hora&&d.auditorio===auditorio&&d.nome===nome);
  }).filter(Boolean);
  items.sort((a,b)=>a.dia.localeCompare(b.dia)||a.hora.localeCompare(b.hora));
  if(!items.length){alert('Adicione sessões ao roteiro primeiro.');return;}
  let txt='MEU ROTEIRO — AVISTAR\n'+'='.repeat(40)+'\n\n';
  let day='';
  items.forEach(i=>{
    if(i.dia!==day){day=i.dia;txt+=`DIA ${day}\n${'-'.repeat(30)}\n`;}
    txt+=`${i.hora} | ${i.auditorio}\n${i.titulo}\n${i.nome}\n\n`;
  });
  const b=document.createElement('a');
